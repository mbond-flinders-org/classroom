name: Join an assignment
description: Internal — opened automatically when you click an Accept / Create-team / Join-team link.
title: "join:<assignment-id>"
labels: ["join"]
body:
  - type: markdown
    attributes:
      value: |
        **Don't open this manually.** Go to the assignment page and click the **Accept**, **Create team**, or **Join team** link.
        The link prefills the title for you.

        If you got here by accident, just close this issue.
  - type: input
    id: notes
    attributes:
      label: Notes (optional)
      description: Anything you want to tell the instructor — not required.
      placeholder: ""
    validations:
      required: false
