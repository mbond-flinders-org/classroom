name: Handle join issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    # Only act on join-labeled issues. Template auto-applies the `join` label,
    # so the label is present in the `opened` event payload.
    if: contains(github.event.issue.labels.*.name, 'join')
    runs-on: ubuntu-latest
    concurrency:
      group: classroom-state
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci || npm install

      - name: Mint installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run handle-join
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node scripts/handle-join.js

      - name: Commit state changes
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          git config user.name  "classroom-bot"
          git config user.email "classroom-bot@users.noreply.github.com"
          git add state/ assignments/ README.md
          if git diff --cached --quiet; then
            echo "No state changes."
            exit 0
          fi
          git commit -m "state: issue #${{ github.event.issue.number }} (${{ github.event.issue.user.login }})"
          # Rebase-retry loop in case build-readmes or another join landed first
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Push failed after retries"; exit 1
