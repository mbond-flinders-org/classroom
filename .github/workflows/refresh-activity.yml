name: Refresh activity

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:

permissions:
  contents: write

env:
  STATE_REPO: ${{ github.repository_owner }}/classroom-state

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: classroom-state
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          path: classroom

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - working-directory: classroom
        run: npm ci || npm install

      - name: Mint installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: classroom,classroom-state

      - name: Checkout classroom-state (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STATE_REPO }}
          token: ${{ steps.app.outputs.token }}
          path: state-repo

      - name: Refresh
        working-directory: classroom
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLASSROOM_ROOT: ${{ github.workspace }}/classroom
          STATE_ROOT: ${{ github.workspace }}/state-repo
        run: node scripts/refresh-activity.js

      - name: Commit
        working-directory: state-repo
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          git config user.name  "classroom-bot"
          git config user.email "classroom-bot@users.noreply.github.com"
          git add README.md state/
          if git diff --cached --quiet; then
            echo "No activity changes."
          else
            git commit -m "chore: refresh activity [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 2
            done
          fi
