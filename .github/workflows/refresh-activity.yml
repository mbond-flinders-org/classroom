name: Refresh activity

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: classroom-state
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci || npm install

      - name: Mint installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Refresh
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/refresh-activity.js

      - name: Commit
        run: |
          git config user.name  "classroom-bot"
          git config user.email "classroom-bot@users.noreply.github.com"
          git add state/ assignments/ README.md
          if git diff --cached --quiet; then
            echo "No activity changes."
            exit 0
          fi
          git commit -m "chore: refresh activity [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && exit 0
            sleep 2
          done
          echo "Push failed"; exit 1
