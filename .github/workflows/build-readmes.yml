name: Build READMEs

on:
  push:
    branches: [main]
    paths:
      - 'assignments/**'
      - 'scripts/**'
      - '.github/workflows/build-readmes.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  STATE_REPO: ${{ github.repository_owner }}/classroom-state

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: classroom-state
      cancel-in-progress: false
    steps:
      - name: Checkout classroom (public)
        uses: actions/checkout@v4
        with:
          path: classroom

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: classroom
        run: npm ci || npm install

      - name: Mint installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout classroom-state (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STATE_REPO }}
          token: ${{ steps.app.outputs.token }}
          path: state-repo

      - name: Regenerate READMEs
        working-directory: classroom
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLASSROOM_ROOT: ${{ github.workspace }}/classroom
          STATE_ROOT: ${{ github.workspace }}/state-repo
        run: node scripts/build-readmes.js

      - name: Commit to classroom (public)
        working-directory: classroom
        run: |
          git config user.name  "classroom-bot"
          git config user.email "classroom-bot@users.noreply.github.com"
          git add README.md assignments/
          if git diff --cached --quiet; then
            echo "No public README changes."
          else
            git commit -m "docs: regenerate READMEs [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" && git push && break
              sleep 2
            done
          fi

      - name: Commit to classroom-state (private)
        working-directory: state-repo
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          git config user.name  "classroom-bot"
          git config user.email "classroom-bot@users.noreply.github.com"
          git add README.md state/
          if git diff --cached --quiet; then
            echo "No state README changes."
          else
            git commit -m "docs: regenerate rosters [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 2
            done
          fi
